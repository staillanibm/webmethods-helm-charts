apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-server-configmap
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    {{- with .Values.extraLabels -}}
    {{ toYaml . | nindent 4 }}
    {{- end }}
data:
  license.key: |
      {{- .Values.terracotta.license | nindent 4 }}
  tc-config.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <!--
    Copyright (c) 2024 IBM Corporation.
    Use, reproduction, transfer, publication or disclosure is prohibited except as specifically provided for in your License Agreement with IBM webMethods.
    -->

    <tc:tc-config xmlns:tc="http://www.terracotta.org/config">
      <servers secure="{{ $.Values.terracotta.security }}">    
    {{- $root := . }}
    {{- range $i := until (int $.Values.terracotta.stripeCount) }}
        <mirror-group>
    {{- range $j := until (int $.Values.terracotta.nodeCountPerStripe) }}
          <server host="{{ include "common.names.fullname" $root }}-terracotta-{{ add (mul $i $.Values.terracotta.nodeCountPerStripe) $j }}.{{ include "common.names.fullname" $root }}-terracotta-service.{{ $.Release.Namespace }}.svc.cluster.local"
                  name="{{ include "common.names.fullname" $root }}-terracotta-{{ add (mul $i $.Values.terracotta.nodeCountPerStripe) $j }}">
            <tsa-port>{{ $.Values.terracotta.tsaPort }} </tsa-port>
            <tsa-group-port>{{ $.Values.terracotta.tsaGroupPort }}</tsa-group-port>
            <management-port>{{ $.Values.terracotta.tsaManagementPort }}</management-port>
            <data>/opt/terracotta/run/data</data>
            <logs>/opt/terracotta/run/logs</logs>
            <dataStorage size={{ $.Values.terracotta.datastoreSize | quote }}>
              <offheap size={{ $.Values.terracotta.offHeapSize | quote }}/>
            </dataStorage>
            {{- if eq $.Values.terracotta.security true }}
            <security>
              <ssl>
                <certificate>jks:{{ include "common.names.fullname" $root }}-terracotta-{{ add (mul $i $.Values.terracotta.nodeCountPerStripe) $j }}@/opt/terracotta/run/{{ include "common.names.fullname" $root }}-terracotta-{{ add (mul $i $.Values.terracotta.nodeCountPerStripe) $j }}-keystore.jks</certificate>
              </ssl>
              <keychain>
                <class>com.terracotta.management.keychain.FileStoreKeyChain</class>
                <url>file:/opt/terracotta/run/keychain</url>
              </keychain>
              <auth>
                <realm>com.tc.net.core.security.ShiroIniRealm</realm>
                <url>file:/opt/terracotta/run/terracotta.ini</url>
                <user>user</user>
              </auth>
              <management>
                <ia>https://{{ include "common.names.fullname" $root }}-tmc-0.{{ include "common.names.fullname" $root }}-tmc-service.{{ $.Release.Namespace }}.svc.cluster.local:{{ $.Values.terracotta.tmcSecurePort }}/tmc/api/assertIdentity</ia>
                <timeout>10000</timeout>
                <hostname>{{ include "common.names.fullname" $root }}-terracotta-{{ add (mul $i $.Values.terracotta.nodeCountPerStripe) $j }}.{{ include "common.names.fullname" $root }}-terracotta-service.{{ $.Release.Namespace }}.svc.cluster.local</hostname>
              </management>
            </security>
            {{- end }}
          </server>
    {{- end }}
        </mirror-group>
    {{- end }}
        <restartable enabled={{ $.Values.terracotta.restartable | quote }}/>
      </servers>
    </tc:tc-config>